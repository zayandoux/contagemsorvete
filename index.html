<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testador de Lista M3U (Sem Bloqueio)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .status {
            margin-top: 15px;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .loading { background-color: #fff3cd; color: #856404; }
        .dashboard {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            width: 30%;
            text-align: center;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1em; }
        .counter { font-size: 1.8em; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador Rápido de Lista M3U</h2>
    <p>Insira a URL da lista M3U. O sistema usa um desvio automático de segurança para evitar bloqueios do navegador.</p>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="m3uUrl" placeholder="Cole o link completo da M3U aqui..." />
        <button onclick="testarLista()">Testar Lista</button>
    </div>

    <div id="statusMessage" class="status" style="display: none;"></div>

    <div class="dashboard">
        <div class="card">
            <h3>Canais de TV</h3>
            <div id="tvCount" class="counter">0</div>
        </div>
        <div class="card">
            <h3>Filmes</h3>
            <div id="movieCount" class="counter">0</div>
        </div>
        <div class="card">
            <h3>Séries</h3>
            <div id="seriesCount" class="counter">0</div>
        </div>
    </div>
</div>

<script>
async function testarLista() {
    const urlOriginal = document.getElementById('m3uUrl').value.trim();
    
    // Resetar contadores na tela
    document.getElementById('tvCount').innerText = '0';
    document.getElementById('movieCount').innerText = '0';
    document.getElementById('seriesCount').innerText = '0';

    if (!urlOriginal) {
        showStatus('Por favor, insira uma URL válida.', 'error');
        return;
    }

    showStatus('Conectando de forma segura e baixando a lista... Aguarde (listas grandes podem demorar um pouco).', 'loading');

    // Aqui está o truque: passamos o link através de um proxy que libera o CORS automaticamente
    const urlComProxy = `https://corsproxy.io/?url=${encodeURIComponent(urlOriginal)}`;

    try {
        const response = await fetch(urlComProxy);
        
        if (!response.ok) {
            throw new Error(`Erro na resposta do servidor (Código ${response.status})`);
        }

        const text = await response.text();
        
        if (!text.includes('#EXTM3U')) {
            throw new Error('O link respondeu, mas os dados recebidos não são de uma lista M3U válida.');
        }

        showStatus('Lista baixada! Contando itens...', 'loading');
        processarM3U(text);

    } catch (error) {
        showStatus(`Falha no teste: ${error.message}.<br><small>Se o app do cliente funciona e aqui falhou, o servidor deles pode estar bloqueando acessos vindos de fora do país ou de servidores de hospedagem.</small>`, 'error');
    }
}

function showStatus(text, type) {
    const statusDiv = document.getElementById('statusMessage');
    statusDiv.innerHTML = text;
    statusDiv.className = `status ${type}`;
    statusDiv.style.display = 'block';
}

function processarM3U(text) {
    let tv = 0;
    let movies = 0;
    let series = 0;

    // Quebra o arquivo em linhas simples
    const linhas = text.split('\n');

    for (let i = 0; i < linhas.length; i++) {
        let linha = linhas[i].toUpperCase();
        
        if (linha.startsWith('#EXTINF:')) {
            // Regras de identificação baseadas no padrão de links do Xtream Codes
            if (linha.includes('SERIES') || linha.includes('SÉRIES') || linha.includes('/SERIES/')) {
                series++;
            } else if (linha.includes('MOVIES') || linha.includes('FILMES') || linha.includes('/MOVIES/') || linha.includes('/MOVIE/')) {
                movies++;
            } else {
                tv++;
            }
        }
    }

    document.getElementById('tvCount').innerText = tv.toLocaleString('pt-BR');
    document.getElementById('movieCount').innerText = movies.toLocaleString('pt-BR');
    document.getElementById('seriesCount').innerText = series.toLocaleString('pt-BR');

    showStatus(`Sucesso! O servidor respondeu perfeitamente e a lista está ativa.`, 'success');
}
</script>

</body>
</html>
