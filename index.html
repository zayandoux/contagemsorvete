<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Hub | Root Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* Sistema de Cores Retro-Futurista / Terminal */
:root {
    --bg-main: #050505;
    --bg-terminal: #0a0a0a;
    --border: #1f2937;
    --text-main: #22c55e; /* Verde Hacker Tradicional */
    --text-muted: #15803d;
    --accent: #4ade80;
    --shadow: rgba(34, 197, 94, 0.05);
    --switch-bg: #141414;
}

[data-theme="light"] {
    --bg-main: #f8fafc;
    --bg-terminal: #ffffff;
    --border: #e2e8f0;
    --text-main: #0f172a; /* Modo Amber/Escuro Clássico se quiser alterar, aqui deixamos cinza escuro corporativo */
    --text-muted: #64748b;
    --accent: #2563eb;
    --shadow: rgba(0,0,0,0.02);
    --switch-bg: #e2e8f0;
}

* {
    box-sizing: border-box;
    font-family: 'Fira Code', monospace; /* Fonte estilo código */
    margin: 0;
    padding: 0;
    transition: background-color 0.2s, border-color 0.2s, color 0.2s;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Caixa do Terminal Shell */
.terminal-window {
    width: 100%;
    max-width: 850px;
    background-color: var(--bg-terminal);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 20px 40px var(--shadow);
    overflow: hidden;
}

/* Barra de Topo do Sistema Operacional */
.terminal-topbar {
    background-color: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.window-dots {
    display: flex;
    gap: 8px;
}
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: var(--border);
}

.window-title {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Interruptor Minimalista Sol/Lua */
.theme-switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 22px;
}
.theme-switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--switch-bg);
    transition: 0.3s;
    border-radius: 22px;
    border: 1px solid var(--border);
}
.slider::before {
    position: absolute;
    content: "";
    height: 14px;
    width: 14px;
    left: 3px;
    bottom: 3px;
    background-color: var(--text-main);
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 50%;
}
input:checked + .slider::before {
    transform: translateX(22px);
}

/* Área Interna de Linhas do Console */
.terminal-body {
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-size: 14px;
    line-height: 1.6;
}

.system-output {
    color: var(--text-muted);
}

/* Linha de Prompt Ativa (Entrada de comandos) */
.command-line {
    display: flex;
    align-items: center;
    gap: 10px;
}

.prompt-symbol {
    color: var(--accent);
    font-weight: 700;
}

.cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-main);
    font-size: 14px;
    font-family: 'Fira Code', monospace;
    width: 100%;
}

/* Log de Servidores Printados */
.terminal-log {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}

.log-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(34, 197, 94, 0.1);
}
[data-theme="light"] .log-row {
    border-bottom: 1px dashed rgba(0, 0, 0, 0.05);
}

.server-info-cli {
    white-space: nowrap;
}

.server-url-cli {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 380px;
    flex: 1;
    margin-left: 15px;
}

.cli-actions {
    display: flex;
    gap: 12px;
}

.cli-link {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    font-weight: 700;
    background: none;
    border: none;
    font-size: 13px;
}
.cli-link:hover {
    text-decoration: underline;
}

.cli-link.copied {
    color: #ffffff;
    background-color: var(--text-muted);
    padding: 0 4px;
}
[data-theme="light"] .cli-link.copied {
    color: #ffffff;
    background-color: #22c55e;
}
</style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-topbar">
        <div class="window-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="window-title">bash - m3uhub@root</div>
        <label class="theme-switch" title="Mudar Paleta de Cores">
            <input type="checkbox" id="theme-toggle-chk" onchange="toggleTheme()">
            <div class="slider"></div>
        </label>
    </div>

    <div class="terminal-body">
        <div class="system-output">
            M3U Hub Core OS v3.0.0 (personal_build)<br>
            Digite o comando estruturado para gerar as listagens.<br>
            Sintaxe: <span style="color: var(--text-main)">gerar [usuario] [senha]</span>
        </div>

        <div id="terminalConsole" class="terminal-log"></div>

        <div class="command-line">
            <span class="prompt-symbol">m3uhub ~ $</span>
            <input type="text" id="cliInput" class="cmd-input" placeholder="gerar user123 pass123" autofocus autocomplete="off">
        </div>
    </div>
</div>

<script>
const servidores = [
    {nome:"Seven", url:"http://seven.blcplay.com"},
    {nome:"Explosion", url:"http://nsync.space"},
    {nome:"Speed", url:"http://netuno.live"},
    {nome:"Galaxy", url:"http://galaxy.blcplay.com"},
    {nome:"Lunar", url:"http://lunar.kkrototv.fun"},
    {nome:"Atena", url:"http://atena.kkrototv.fun"},
    {nome:"Solar", url:"http://solar.kkrototv.fun"},
    {nome:"Venus", url:"http://venus.blcplay.com"},
    {nome:"Fire", url:"http://fire.kkrototv.fun"}
];

// Captura a tecla enter na linha de comando
document.getElementById('cliInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        processarComando(this.value);
    }
});

function toggleTheme() {
    const body = document.documentElement;
    if (document.getElementById("theme-toggle-chk").checked) {
        body.setAttribute("data-theme", "light");
    } else {
        body.removeAttribute("data-theme");
    }
}

function processarComando(valorCompleto) {
    let consoleTerminal = document.getElementById("terminalConsole");
    let inputField = document.getElementById("cliInput");
    
    let partes = valorCompleto.trim().split(/\s+/); // Divide por espaços
    let comando = partes[0] ? partes[0].toLowerCase() : "";
    let user = partes[1];
    let pass = partes[2];

    // Se o input estiver vazio, não faz nada
    if(!comando) return;

    // Reseta o input para o próximo comando
    inputField.value = "";

    // Comando "clear" para limpar a tela
    if (comando === "clear" || comando === "cls") {
        consoleTerminal.innerHTML = "";
        return;
    }

    // Validação da estrutura de geração
    if (comando === "gerar") {
        if (!user || !pass) {
            consoleTerminal.innerHTML = `<div style="color: #ef4444">[ERRO] Parâmetros ausentes. Use: gerar [user] [pass]</div>`;
            return;
        }

        consoleTerminal.innerHTML = `<div style="color: var(--accent)">[OK] Compilando links M3U para as credenciais injetadas...</div>`;

        servidores.forEach((s, i) => {
            let linkCompleto = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;
            
            let row = document.createElement("div");
            row.className = "log-row";
            row.innerHTML = `
                <div class="server-info-cli">> ${s.nome}</div>
                <div class="server-url-cli">${linkCompleto}</div>
                <div class="cli-actions">
                    <button id="copy-m3u-${i}" class="cli-link">[COPIAR_M3U]</button>
                    <button id="copy-dns-${i}" class="cli-link">[DNS]</button>
                </div>
            `;
            consoleTerminal.appendChild(row);

            // Funções de clique puras integradas por ID
            document.getElementById(`copy-m3u-${i}`).onclick = function() {
                navigator.clipboard.writeText(linkCompleto);
                this.innerText = "[COPIADO]";
                this.classList.add("copied");
                setTimeout(() => { this.innerText = "[COPIAR_M3U]"; this.classList.remove("copied"); }, 1200);
            };

            document.getElementById(`copy-dns-${i}`).onclick = function() {
                navigator.clipboard.writeText(s.url);
                this.innerText = "[COPIADO]";
                this.classList.add("copied");
                setTimeout(() => { this.innerText = "[DNS]"; this.classList.remove("copied"); }, 1200);
            };
        });
    } else {
        // Resposta caso digite qualquer outra coisa inválida
        consoleTerminal.innerHTML = `<div style="color: #ef4444">[ERRO] Comando '${comando}' não reconhecido. Tente 'gerar' ou 'clear'.</div>`;
    }
}
</script>

</body>
</html>
