<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Hub | Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Sistema de Cores e Temas Base */
:root {
    --bg-main: #0c0a09;
    --bg-sidebar: #1c1917;
    --bg-card: #262220;
    --border: rgba(255, 255, 255, 0.06);
    --text-main: #f5f5f4;
    --text-muted: #a8a29e;
    --bg-input: #1c1917;
    --accent: #f97316; /* Cor Padrão: Laranja */
    --accent-hover: #ea580c;
    --shadow: rgba(0,0,0,0.4);
    --switch-bg: #44403c;
}

[data-theme="light"] {
    --bg-main: #fafaf9;
    --bg-sidebar: #ffffff;
    --bg-card: #f5f5f4;
    --border: rgba(0, 0, 0, 0.08);
    --text-main: #1c1917;
    --text-muted: #78716c;
    --bg-input: #f5f5f4;
    --accent: #ea580c;
    --accent-hover: #c2410c;
    --shadow: rgba(0,0,0,0.05);
    --switch-bg: #e7e5e4;
}

/* --- PALETAS DE CORES PREMIUM --- */

/* Verde Esmeralda */
[data-palette="emerald"] { --accent: #10b981; --accent-hover: #059669; }
[data-theme="light"][data-palette="emerald"] { --accent: #059669; --accent-hover: #047857; }

/* Azul Royal */
[data-palette="blue"] { --accent: #3b82f6; --accent-hover: #2563eb; }
[data-theme="light"][data-palette="blue"] { --accent: #2563eb; --accent-hover: #1d4ed8; }

/* Roxo Cyber */
[data-palette="purple"] { --accent: #a855f7; --accent-hover: #9333ea; }
[data-theme="light"][data-palette="purple"] { --accent: #9333ea; --accent-hover: #7e22ce; }

/* Vermelho Rubi */
[data-palette="ruby"] { --accent: #ef4444; --accent-hover: #dc2626; }
[data-theme="light"][data-palette="ruby"] { --accent: #dc2626; --accent-hover: #b91c1c; }

/* Ciano Elétrico */
[data-palette="cyan"] { --accent: #06b6d4; --accent-hover: #0891b2; }
[data-theme="light"][data-palette="cyan"] { --accent: #0891b2; --accent-hover: #0e7490; }

/* Rosa Choque */
[data-palette="pink"] { --accent: #ec4899; --accent-hover: #db2777; }
[data-theme="light"][data-palette="pink"] { --accent: #db2777; --accent-hover: #be185d; }

* {
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    padding: 0;
    transition: background-color 0.2s, border-color 0.2s, color 0.2s;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* --- COLUNA ESQUERDA: SIDEBAR DE CONTROLE --- */
.sidebar {
    width: 320px;
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 35px 25px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 10px 0 30px var(--shadow);
    z-index: 10;
}

.brand-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
}

.brand h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
}
.brand p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
}

.header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
}

.palette-trigger-btn {
    background: transparent;
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
}
.palette-trigger-btn:hover {
    transform: scale(1.15);
}

.color-menu-panel {
    display: none;
    position: absolute;
    top: 45px;
    right: 0;
    background-color: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    padding: 8px;
    width: 170px;
    flex-direction: column;
    gap: 4px;
    z-index: 100;
}
.color-menu-panel.active {
    display: flex;
}

.color-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
}
.color-option:hover {
    background-color: var(--bg-card);
}
.color-circle {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
}

/* INTERRUPTOR PREMIUM */
.theme-switch {
    position: relative;
    display: inline-block;
    width: 54px;
    height: 28px;
}

.theme-switch input { 
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--switch-bg);
    transition: 0.3s;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px;
}

.slider::before {
    content: "🌙";
    font-size: 12px;
    order: 2;
    transition: 0.3s;
}

.slider::after {
    content: "☀️";
    font-size: 12px;
    order: 1;
    opacity: 0.3;
    transition: 0.3s;
}

.knob {
    position: absolute;
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.3s ease-in-out;
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    z-index: 2;
}

input:checked + .slider { background-color: var(--accent); }
input:checked + .slider .knob { transform: translateX(26px); }
input:checked + .slider::before { opacity: 0.3; }
input:checked + .slider::after { opacity: 1; }

/* Formulário Vertical */
.form-container {
    margin-top: 40px;
    flex-grow: 1;
}

.input-wrapper {
    position: relative;
    margin-bottom: 20px;
}

.input-wrapper label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    color: var(--text-muted);
}

.input-wrapper input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background-color: var(--bg-main);
    color: var(--text-main);
    font-size: 15px;
    outline: none;
}
.input-wrapper input:focus {
    border-color: var(--accent);
}

.btn-submit {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background-color: var(--accent);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
}
.btn-submit:hover {
    background-color: var(--accent-hover);
}

.sidebar-footer {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 15px;
}

/* --- COLUNA DIREITA: CONTEÚDO / LISTA --- */
.main-content {
    flex: 1;
    padding: 45px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.main-content h3 {
    font-size: 20px;
    margin-bottom: 24px;
    font-weight: 600;
}

.server-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.server-row {
    background-color: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
}
.server-row:hover {
    border-color: var(--text-muted);
}

.server-meta-block {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
}

.status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: #22c55e;
    flex-shrink: 0;
}

.server-name {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    flex-shrink: 0;
}

.server-url-display {
    font-size: 13px;
    color: var(--text-muted);
    background-color: var(--bg-main);
    padding: 6px 12px;
    border-radius: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
    border: 1px solid var(--border);
}

.row-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
}

.row-actions button {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background-color: var(--bg-card);
    color: var(--text-main);
}

.btn-m3u {
    background-color: var(--accent) !important;
    color: white !important;
    border: none !important;
}
.btn-m3u:hover { background-color: var(--accent-hover) !important; }

.row-actions button.copied {
    background-color: #22c55e !important;
    color: white !important;
    border: none !important;
}

.btn-test {
    padding: 8px 10px !important;
}
.btn-test:hover {
    color: #ef4444;
}

.empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 15px;
}

.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 10px; }

@media(max-width: 850px){
    body { flex-direction: column; overflow: auto; height: auto; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .main-content { overflow-y: visible; padding: 25px; }
    .server-row { flex-direction: column; align-items: stretch; text-align: center; }
    .server-meta-block { justify-content: center; }
    .server-url-display { max-width: 100%; width: 100%; }
    .row-actions { justify-content: center; }
    .color-menu-panel { right: 50%; transform: translateX(50%); top: 50px; }
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="top-section">
        <div class="brand-wrapper">
            <div class="brand">
                <h2>M3U Hub Panel</h2>
                <p>Gerenciador</p>
            </div>
            
            <div class="header-controls">
                <button class="palette-trigger-btn" onclick="togglePaletteMenu()" title="Mudar Cor do Tema">✏️</button>
                
                <label class="theme-switch" title="Alternar Tema">
                    <input type="checkbox" id="theme-toggle-chk" onchange="toggleTheme()">
                    <div class="slider">
                        <span class="knob"></span>
                    </div>
                </label>
            </div>

            <div class="color-menu-panel" id="palette-menu">
                <div class="color-option" onclick="setPalette('default')">
                    <div class="color-circle" style="background-color: #f97316;"></div> Laranja Padrão
                </div>
                <div class="color-option" onclick="setPalette('emerald')">
                    <div class="color-circle" style="background-color: #10b981;"></div> Verde Esmeralda
                </div>
                <div class="color-option" onclick="setPalette('blue')">
                    <div class="color-circle" style="background-color: #3b82f6;"></div> Azul Royal
                </div>
                <div class="color-option" onclick="setPalette('purple')">
                    <div class="color-circle" style="background-color: #a855f7;"></div> Roxo Cyber
                </div>
                <div class="color-option" onclick="setPalette('ruby')">
                    <div class="color-circle" style="background-color: #ef4444;"></div> Vermelho Rubi
                </div>
                <div class="color-option" onclick="setPalette('cyan')">
                    <div class="color-circle" style="background-color: #06b6d4;"></div> Ciano Elétrico
                </div>
                <div class="color-option" onclick="setPalette('pink')">
                    <div class="color-circle" style="background-color: #ec4899;"></div> Rosa Choque
                </div>
            </div>
        </div>

        <div class="form-container">
            <div class="input-wrapper">
                <label>Usuário</label>
                <input id="user" placeholder="Digite o acesso" autocomplete="off">
            </div>
            <div class="input-wrapper">
                <label>Senha</label>
                <input id="pass" type="text" placeholder="Digite a senha" autocomplete="off">
            </div>
            <button class="btn-submit" onclick="gerar()">Gerar Acessos</button>
        </div>
    </div>

    <div class="sidebar-footer">
        v2.0 • Premium Access
    </div>
</div>

<div class="main-content">
    <h3>Servidores Disponíveis</h3>
    <div id="resultado">
        <div class="empty-state">Insira as credenciais ao lado e clique em "Gerar Acessos".</div>
    </div>
</div>

<script>
// Carregamento inicial do Storage
document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("hub-theme");
    const themeChk = document.getElementById("theme-toggle-chk");
    if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        themeChk.checked = true;
    } else {
        document.documentElement.removeAttribute("data-theme");
        themeChk.checked = false;
    }

    const savedPalette = localStorage.getItem("hub-palette");
    if (savedPalette && savedPalette !== "default") {
        document.documentElement.setAttribute("data-palette", savedPalette);
    }
});

// Nova lista exata com as 12 DNS atualizadas para o domínio .uinet1.shop
const servidores = [
    {nome:"Seven", url:"http://seven.uinet1.shop"},
    {nome:"Speed", url:"http://speed.uinet1.shop"},
    {nome:"Galaxy", url:"http://galaxy.uinet1.shop"},
    {nome:"Lunar", url:"http://lunar.uinet1.shop"},
    {nome:"Fire", url:"http://fire.uinet1.shop"},
    {nome:"Andromeda", url:"http://andromeda.uinet1.shop"},
    {nome:"Atena", url:"http://atena.uinet1.shop"},
    {nome:"Hades", url:"http://hades.uinet1.shop"},
    {nome:"Solar", url:"http://solar.uinet1.shop"},
    {nome:"Tita", url:"http://tita.uinet1.shop"},
    {nome:"Urano", url:"http://urano.uinet1.shop"},
    {nome:"Venus", url:"http://venus.uinet1.shop"}
];

function toggleTheme() {
    const body = document.documentElement;
    const isChecked = document.getElementById("theme-toggle-chk").checked;

    if (isChecked) {
        body.setAttribute("data-theme", "light");
        localStorage.setItem("hub-theme", "light");
    } else {
        body.removeAttribute("data-theme");
        localStorage.setItem("hub-theme", "dark");
    }
}

function togglePaletteMenu() {
    document.getElementById("palette-menu").classList.toggle("active");
}

function setPalette(name) {
    const body = document.documentElement;
    if (name === 'default') {
        body.removeAttribute("data-palette");
        localStorage.setItem("hub-palette", "default");
    } else {
        body.setAttribute("data-palette", name);
        localStorage.setItem("hub-palette", name);
    }
    document.getElementById("palette-menu").classList.remove("active");
}

window.onclick = function(event) {
    if (!event.target.matches('.palette-trigger-btn') && !event.target.closest('.color-menu-panel')) {
        document.getElementById("palette-menu").classList.remove("active");
    }
}

function gerar(){
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();

    if(!user || !pass){
        alert("Preencha usuário e senha na barra lateral.");
        return;
    }

    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    let listContainer = document.createElement("div");
    listContainer.className = "server-list";

    servidores.forEach((s,i)=>{
        let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

        let row = document.createElement("div");
        row.className = "server-row";
        row.innerHTML = `
            <div class="server-meta-block">
                <div class="status-indicator"></div>
                <div class="server-name">${s.nome}</div>
                <div class="server-url-display">${link}</div>
            </div>
            <div class="row-actions">
                <button id="m3u${i}" class="btn-m3u">Copiar M3U</button>
                <button id="dns${i}">DNS</button>
                <button class="btn-test" onclick="testar('${s.url}')" title="Testar">↗</button>
            </div>
        `;
        listContainer.appendChild(row);
        resultado.appendChild(listContainer);

        document.getElementById(`m3u${i}`).onclick = function(){
            navigator.clipboard.writeText(link);
            this.innerText = "Copiado!";
            this.classList.add("copied");
            setTimeout(() => { this.innerText = "Copiar M3U"; this.classList.remove("copied"); }, 1800);
        };

        document.getElementById(`dns${i}`).onclick = function(){
            navigator.clipboard.writeText(s.url);
            this.innerText = "Copiado!";
            this.classList.add("copied");
            setTimeout(() => { this.innerText = "DNS"; this.classList.remove("copied"); }, 1800);
        };
    });
}

function testar(url){ window.open(url, "_blank"); }
</script>

</body>
</html>
