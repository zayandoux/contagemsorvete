<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Hub | Command Center</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Sistema de Cores */
:root {
    --bg-main: #09090b;
    --bg-surface: #18181b;
    --border: rgba(255, 255, 255, 0.08);
    --text-main: #f4f4f5;
    --text-muted: #71717a;
    --accent: #f97316;
    --accent-hover: #ea580c;
    --grid-columns: repeat(3, 1fr);
}

[data-theme="light"] {
    --bg-main: #fafafa;
    --bg-surface: #ffffff;
    --border: rgba(0, 0, 0, 0.08);
    --text-main: #09090b;
    --text-muted: #a1a1aa;
    --accent: #ea580c;
    --accent-hover: #c2410c;
}

* {
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    padding: 0;
    transition: background-color 0.3s, border-color 0.3s, color 0.3s;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 40px 20px;
}

/* Container Centralizador Fluido */
.app-container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 30px;
    align-items: center;
}

/* --- INTERRUPTOR DE TEMA (Flutuante no topo direito) --- */
.theme-switch-wrapper {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
}

.theme-switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
}
.theme-switch input { opacity: 0; width: 0; height: 0; }

.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--bg-surface);
    border: 1px solid var(--border);
    transition: 0.3s;
    border-radius: 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5px;
}
.slider::before { content: "🌙"; font-size: 11px; order: 2; }
.slider::after { content: "☀️"; font-size: 11px; order: 1; opacity: 0.3; }

.knob {
    position: absolute;
    height: 20px;
    width: 20px;
    left: 2px;
    bottom: 2px;
    background-color: var(--text-main);
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 50%;
    z-index: 2;
}
input:checked + .slider { background-color: var(--accent); border-color: transparent; }
input:checked + .slider .knob { transform: translateX(24px); background-color: #fff; }
input:checked + .slider::before { opacity: 0.3; }
input:checked + .slider::after { opacity: 1; }


/* --- BARRA DE INPUT GIGANTE (ESTILO RAYCAST) --- */
.search-box-wrapper {
    width: 100%;
    background-color: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
}

/* Quando os resultados aparecem, a barra ganha um destaque sutil */
.search-box-wrapper.active {
    transform: translateY(-5px);
    border-color: var(--accent);
}

.inputs-inline {
    display: flex;
    flex: 1;
    gap: 8px;
}

.inputs-inline input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 16px;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-main);
}

.inputs-inline input::placeholder {
    color: var(--text-muted);
}

/* Divisor sutil entre Usuário e Senha dentro do input */
.input-divider {
    width: 1px;
    background-color: var(--border);
    margin: 12px 0;
}

.btn-trigger {
    background-color: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
}
.btn-trigger:hover { background-color: var(--accent-hover); }


/* --- GRID DE RESULTADOS (A EXPLOSÃO VISUAL) --- */
.results-grid {
    display: grid;
    grid-template-columns: var(--grid-columns);
    gap: 16px;
    width: 100%;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Classe ativada via JS para fazer a expansão acontecer */
.results-grid.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

/* Cards Compactos da Grade */
.server-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 16px;
    position: relative;
    overflow: hidden;
}
.server-card:hover {
    border-color: var(--text-muted);
}

.card-header-block {
    display: flex;
    align-items: center;
    gap: 10px;
}

.status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background-color: #22c55e;
}

.server-title {
    font-weight: 600;
    font-size: 15px;
}

.server-url-short {
    font-size: 12px;
    color: var(--text-muted);
    background-color: var(--bg-main);
    padding: 8px 12px;
    border-radius: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border: 1px solid var(--border);
}

.card-actions-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 8px;
}

.card-actions-row button {
    padding: 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background-color: var(--bg-main);
    color: var(--text-main);
}

.btn-m3u-prime {
    background-color: var(--accent) !important;
    color: white !important;
    border: none !important;
}
.btn-m3u-prime:hover { background-color: var(--accent-hover) !important; }

.card-actions-row button.copied {
    background-color: #22c55e !important;
    color: white !important;
    border: none !important;
}

/* Responsividade de Grade */
@media(max-width: 900px) { :root { var(--grid-columns): repeat(2, 1fr); } }
@media(max-width: 600px) {
    :root { var(--grid-columns): repeat(1, 1fr); }
    .search-box-wrapper { flex-direction: column; padding: 16px; }
    .inputs-inline { flex-direction: column; width: 100%; gap: 0; }
    .input-divider { height: 1px; width: 100%; margin: 8px 0; }
    .btn-trigger { width: 100%; }
}
</style>
</head>
<body>

<!-- Interruptor de Tema de Canto -->
<div class="theme-switch-wrapper">
    <label class="theme-switch">
        <input type="checkbox" id="theme-toggle-chk" onchange="toggleTheme()">
        <div class="slider"><span class="knob"></span></div>
    </label>
</div>

<div class="app-container">

    <!-- Caixa de Comando Principal -->
    <div class="search-box-wrapper" id="searchBox">
        <div class="inputs-inline">
            <input type="text" id="user" placeholder="Digite o usuário..." autocomplete="off">
            <div class="input-divider"></div>
            <input type="text" id="pass" placeholder="Digite a senha..." autocomplete="off">
        </div>
        <button class="btn-trigger" onclick="dispararComando()">Executar</button>
    </div>

    <!-- Onde a Mágica Acontece: Grid Explodida -->
    <div class="results-grid" id="gridDestino"></div>

</div>

<script>
const servidores = [
    {nome:"🧿 Seven", url:"http://seven.blcplay.com"},
    {nome:"💣 Explosion", url:"http://nsync.space"},
    {nome:"⚡ Speed", url:"http://netuno.live"},
    {nome:"🛸 Galaxy", url:"http://galaxy.blcplay.com"},
    {nome:"🌑 Lunar", url:"http://lunar.kkrototv.fun"},
    {nome:"🏛️ Atena", url:"http://atena.kkrototv.fun"},
    {nome:"☀️ Solar", url:"http://solar.kkrototv.fun"},
    {nome:"🌬️ Venus", url:"http://venus.blcplay.com"},
    {nome:"🔥 Fire", url:"http://fire.kkrototv.fun"}
];

// Listener para disparar ao apertar Enter dentro de qualquer input
document.getElementById('user').addEventListener('keydown', e => { if(e.key === 'Enter') dispararComando(); });
document.getElementById('pass').addEventListener('keydown', e => { if(e.key === 'Enter') dispararComando(); });

function toggleTheme() {
    const body = document.documentElement;
    if (document.getElementById("theme-toggle-chk").checked) {
        body.setAttribute("data-theme", "light");
    } else {
        body.removeAttribute("data-theme");
    }
}

function dispararComando() {
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();
    let searchBox = document.getElementById("searchBox");
    let gridDestino = document.getElementById("gridDestino");

    if (!user || !pass) {
        alert("Por favor, preencha o usuário e a senha.");
        return;
    }

    // Limpa a grid para preparar a nova animação
    gridDestino.innerHTML = "";
    gridDestino.classList.remove("show");
    searchBox.classList.remove("active");

    // Pequeno timeout mecânico para simular um processamento estético
    setTimeout(() => {
        searchBox.classList.add("active");
        
        servidores.forEach((s, i) => {
            let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;
            
            let card = document.createElement("div");
            card.className = "server-card";
            card.innerHTML = `
                <div class="card-header-block">
                    <div class="status-dot"></div>
                    <div class="server-title">${s.nome}</div>
                </div>
                <div class="server-url-short">${link}</div>
                <div class="card-actions-row">
                    <button id="m3u${i}" class="btn-m3u-prime">Copiar M3U</button>
                    <button id="dns${i}">DNS</button>
                </div>
            `;
            gridDestino.appendChild(card);

            // Ações de cópia personalizadas por ID único interno
            document.getElementById(`m3u${i}`).onclick = function() {
                navigator.clipboard.writeText(link);
                this.innerText = "Copiado!";
                this.classList.add("copied");
                setTimeout(() => { this.innerText = "Copiar M3U"; this.classList.remove("copied"); }, 1500);
            };

            document.getElementById(`dns${i}`).onclick = function() {
                navigator.clipboard.writeText(s.url);
                this.innerText = "Pronto!";
                this.classList.add("copied");
                setTimeout(() => { this.innerText = "DNS"; this.classList.remove("copied"); }, 1500);
            };
        });

        // Mostra a grade expandindo suavemente
        gridDestino.classList.add("show");
    }, 200);
}
</script>

</body>
</html>
