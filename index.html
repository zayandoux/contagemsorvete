<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Sorvetes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f7;
    padding: 12px;
    color: #000;
    max-width: 480px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 26px;
    font-weight: 900;
}

.cat-btn {
    width: 100%;
    background: #007aff;
    color: white;
    padding: 12px 14px;
    font-size: 17px;
    border: none;
    border-radius: 12px;
    margin-top: 12px;
    cursor: pointer;
    font-weight: 700;
}

.cat-btn.ativo {
    background: #34c759;
    position: sticky;
    top: 10px;
    z-index: 50;
}

.categoria {
    display: none;
    margin-top: 6px;
    background: #ffffff;
    padding: 6px;
    border-radius: 12px;
}

.item {
    background: #fff;
    padding: 8px;
    margin: 6px 0;
    border-radius: 12px;
}

.item.zero {
    background: #ff4d4d !important;
    color: #fff !important;
}

.item.card {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.info { flex: 1; }

.nome {
    font-size: 17px;
    font-weight: 800;
}

.valor {
    font-size: 14px;
    font-weight: 700;
    color: #007aff;
}

.item.zero .valor { color: #fff; }

.restante {
    font-size: 16px;
    font-weight: 800;
}

.painel {
    background: #f1f1f1;
    padding: 8px;
    border-radius: 10px;
    min-width: 150px;
}

.linha {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
}

.controls {
    display: flex;
    align-items: center;
    gap: 6px;
}

.controls span,
.numero {
    color: #000 !important;
    font-weight: 800;
}

input[type="tel"] {
    width: 80px;
    padding: 6px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
    font-weight: 800;
    text-align: center;
}

#gelo {
    background: #e8f0ff;
    color: #003a8f;
    border: 2px solid #007aff;
}

.btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-weight: 800;
}

.resumo {
    margin-top: 14px;
    padding: 14px;
    background: #ffffff;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
}

.resumo div {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
}

#totalVendas {
    margin-top: 10px;
    font-size: 18px;
    color: #0b6b1a;
}

#comissaoBox {
    margin-top: 10px;
    font-size: 18px;
    color: #007aff;
    font-weight: 900;
}

#limpar {
    width: 100%;
    padding: 12px;
    font-size: 17px;
    border: none;
    border-radius: 12px;
    margin-top: 16px;
    background: #ff3b30;
    color: white;
}
</style>

<script>
let precoPorCategoria = { FRUTARE:10, FRUTILLY:7.5 };

let precosLancamentos = {
    "Clássico":22.50,"Branco":22.50,"Avelã":22.50,"Amêndoas":20.50,
    "Cookies & Cream":22.50,"Menos Açúcar":22.50,"Pistache":22.50,
    "Choco Mix":14.50,"Chocante":14.50,"Uni Cornetto":17.5,
    "M&Ms":17.5,"Brigadeiro Cornetto":17.5,
    "Mini Eski-bon":18.50,"Mini Morango":18.50,"Mini Chicabon":18.50,
    "Mini Doce de Leite":18.50,"Eski-bon":13.50,"Brigadeiro":13,
    "Chicabon":13,"Chicabon Menos Açúcar":13,
    "3 Chocolates":13,"Max Avelã":13,"Tablito":13,
    "Expecto":10,"Grifinória":11,"Sonserina":11
};

let categorias = {
    "MAGNUM": ["Clássico","Branco","Avelã","Amêndoas","Cookies & Cream","Menos Açúcar","Pistache"],
    "CORNETTO": ["Choco Mix","Chocante","Uni Cornetto","M&Ms","Brigadeiro Cornetto"],
    "OS FAVORITOS": ["Mini Eski-bon","Mini Morango","Mini Chicabon","Mini Doce de Leite","Eski-bon","Brigadeiro","Chicabon","Chicabon Menos Açúcar","3 Chocolates","Max Avelã","Tablito"],
    "FRUTARE": ["Tangerina","Limão","Morango","Abacaxi","Uva","Coco"],
    "FRUTILLY": ["Frutilly","Frutilly Pinta Língua"],
    "HARRY POTTER": ["Expecto","Grifinória","Sonserina"]
};

let id=1, total=0;

function salvarDados(){
    let dados = {};
    for(let i=1;i<id;i++){
        dados[i]={
            est: document.getElementById("est_"+i)?.value || "",
            vend: document.getElementById("vend_"+i)?.innerText || "0"
        };
    }
    dados.gelo = document.getElementById("gelo").value || "";
    localStorage.setItem("controleSorvetes", JSON.stringify(dados));
}

function carregarDados(){
    let dados = JSON.parse(localStorage.getItem("controleSorvetes"));
    if(!dados) return;
    for(let i=1;i<id;i++){
        if(dados[i]){
            document.getElementById("est_"+i).value = dados[i].est;
            document.getElementById("vend_"+i).innerText = dados[i].vend;
            atualizar(i);
        }
    }
    document.getElementById("gelo").value = dados.gelo || "";
    recalcular();
}

function toggle(cat){
    let btn = document.getElementById("btn_"+cat);
    let box = document.getElementById("cat_"+cat);
    let aberto = box.style.display === "block";

    document.querySelectorAll(".categoria").forEach(c=>c.style.display="none");
    document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("ativo"));

    if(!aberto){
        box.style.display="block";
        btn.classList.add("ativo");
    }
}

function atualizar(i){
    let est = +document.getElementById("est_"+i).value || 0;
    let vend = +document.getElementById("vend_"+i).innerText;
    let r = Math.max(0, est - vend);

    document.getElementById("resto_"+i).innerText = "Restante: " + r;
    document.getElementById("item_"+i).classList.toggle("zero", r === 0);
    salvarDados();
    recalcular();
}

function addVend(i){
    document.getElementById("vend_"+i).innerText++;
    atualizar(i);
}

function removeVend(i){
    let v=document.getElementById("vend_"+i);
    if(+v.innerText>0) v.innerText--;
    atualizar(i);
}

/* ✅ GELO SECO SOMADO À SORVETERIA */
function recalcular(){
    let i=1; 
    total=0;

    for(let c in categorias){
        categorias[c].forEach(s=>{
            let p = precoPorCategoria[c] ?? precosLancamentos[s];
            total += +document.getElementById("vend_"+i).innerText * p;
            i++;
        });
    }

    let gelo = +document.getElementById("gelo").value || 0;

    let minhaParteBruta = total * 0.25;
    let sorveteriaBase = total * 0.75;

    let minhaParte = Math.max(0, minhaParteBruta - gelo);
    let sorveteria = sorveteriaBase + gelo;

    document.getElementById("valorTotal").innerText = total.toFixed(2);
    document.getElementById("valorSorveteria").innerText = sorveteria.toFixed(2);
    document.getElementById("minhaParte").innerText = minhaParte.toFixed(2);
    document.getElementById("valorComissao").innerText = minhaParte.toFixed(2);

    salvarDados();
}

function confirmarLimpeza(){
    if(confirm("Tem certeza que deseja limpar todo o controle?")){
        localStorage.clear();
        location.reload();
    }
}
</script>
</head>

<body>

<h1>Controle de Sorvetes</h1>

<div id="conteudo">
<script>
for(let c in categorias){
document.write(`<button id="btn_${c}" class="cat-btn" onclick="toggle('${c}')">${c}</button><div id="cat_${c}" class="categoria">`);
categorias[c].forEach(s=>{
let p = precoPorCategoria[c] ?? precosLancamentos[s];
document.write(`
<div class="item card zero" id="item_${id}">
<div class="info">
<div class="nome">${s}</div>
<div class="valor">Preço: R$ ${p.toFixed(2)}</div>
<div class="restante" id="resto_${id}">Restante: 0</div>
</div>

<div class="painel">
<div class="linha">
<div class="controls">
<span>Estoque</span>
<input type="tel" id="est_${id}" oninput="atualizar(${id})">
</div>
</div>

<div class="linha">
<div class="controls">
<span>Vendido</span>
<button class="btn" onclick="removeVend(${id})">-</button>
<span class="numero" id="vend_${id}">0</span>
<button class="btn" onclick="addVend(${id})">+</button>
</div>
</div>
</div>
</div>`);
id++;
});
document.write("</div>");
}
</script>
</div>

<div class="resumo">
<div>
<span>Gelo Seco (R$)</span>
<input type="tel" id="gelo" oninput="recalcular()">
</div>

<div id="totalVendas">
<span>Total de Vendas</span>
<span>R$ <span id="valorTotal">0.00</span></span>
</div> 

<div>
<span>Pagamento Sorveteria (75%)</span>
<span>R$ <span id="valorSorveteria">0.00</span></span>
</div>

<div>
<span>Sua Parte (25%)</span>
<span>R$ <span id="minhaParte">0.00</span></span>
</div>

<div id="comissaoBox">
<span>Comissão Final</span>
<span>R$ <span id="valorComissao">0.00</span></span>
</div>
</div>

<button id="limpar" onclick="confirmarLimpeza()">LIMPAR TUDO</button>

<script>carregarDados();</script>

</body>
</html>
