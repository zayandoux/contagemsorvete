<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testador de Lista M3U</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #218838; }
        .status {
            margin-top: 15px;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .loading { background-color: #fff3cd; color: #856404; }
        .dashboard {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .card {
            background: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            width: 30%;
            text-align: center;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1em; }
        .counter { font-size: 1.8em; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador Rápido de Lista M3U</h2>
    <p>Insira a URL da lista M3U abaixo para testar o carregamento e a contagem de conteúdos.</p>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="m3uUrl" placeholder="http://servidor.com:8080/get.php?auth=..." />
        <button onclick="testarLista()">Testar Lista</button>
    </div>

    <div id="statusMessage" class="status" style="display: none;"></div>

    <div class="dashboard">
        <div class="card">
            <h3>Canal de TV</h3>
            <div id="tvCount" class="counter">0</div>
        </div>
        <div class="card">
            <h3>Filmes</h3>
            <div id="movieCount" class="counter">0</div>
        </div>
        <div class="card">
            <h3>Séries</h3>
            <div id="seriesCount" class="counter">0</div>
        </div>
    </div>
</div>

<script>
async function testarLista() {
    const url = document.getElementById('m3uUrl').value.trim();
    const statusDiv = document.getElementById('statusMessage');
    
    // Resetar contadores
    document.getElementById('tvCount').innerText = '0';
    document.getElementById('movieCount').innerText = '0';
    document.getElementById('seriesCount').innerText = '0';

    if (!url) {
        showStatus('Por favor, insira uma URL válida.', 'error');
        return;
    }

    showStatus('Conectando ao servidor e baixando a lista... Aguarde.', 'loading');

    try {
        // Faz a requisição para buscar o texto da lista
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`Erro no servidor: Status ${response.status}`);
        }

        const text = await response.text();
        
        if (!text.includes('#EXTM3U')) {
            throw new Error('O link respondeu, mas não parece ser uma lista M3U válida.');
        }

        showStatus('Lista carregada com sucesso! Processando dados...', 'loading');
        
        // Processar o texto para contar as categorias
        processarM3U(text);

    } catch (error) {
        showStatus(`Falha ao carregar: ${error.message}. <br><small>Nota: Se o servidor estiver online, o navegador pode ter bloqueado por erro de CORS (Segurança). Se puder, teste com uma extensão de desativar CORS ativa.</small>`, 'error');
    }
}

function showStatus(text, type) {
    const statusDiv = document.getElementById('statusMessage');
    statusDiv.innerHTML = text;
    statusDiv.className = `status ${type}`;
    statusDiv.style.display = 'block';
}

function processarM3U(text) {
    let tv = 0;
    let movies = 0;
    let series = 0;

    // Quebra o arquivo linha por linha
    const linhas = text.split('\n');

    for (let i = 0; i < linhas.length; i++) {
        let linha = linhas[i].toUpperCase();
        
        // Procuramos pelas tags padrão que o Xtream Codes / painéis usam para identificar o tipo
        if (linha.startsWith('#EXTINF:')) {
            if (linha.includes('SERIES') || linha.includes('SÉRIES') || linha.includes('/SERIES/')) {
                series++;
            } else if (linha.includes('MOVIES') || linha.includes('FILMES') || linha.includes('/MOVIES/') || linha.includes('/MOVIE/')) {
                movies++;
            } else {
                // Por padrão, se não se encaixar de forma óbvia em filmes/séries nas tags, costuma ser canal
                tv++;
            }
        }
    }

    // Atualiza a tela com os valores reais encontrados
    document.getElementById('tvCount').innerText = tv;
    document.getElementById('movieCount').innerText = movies;
    document.getElementById('seriesCount').innerText = series;

    showStatus(`Sucesso! O servidor respondeu e a lista foi lida por completo.`, 'success');
}
</script>

</body>
</html>
