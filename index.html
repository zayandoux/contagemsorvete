<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha Clássico</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
        }

        #placar {
            font-size: 24px;
            margin-bottom: 20px;
        }

        canvas {
            border: 4px solid #fff;
            background-color: #111;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .mensagem {
            margin-top: 15px;
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>Jogo da Cobrinha</h1>
    <div id="placar">Pontuação: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="mensagem">Use as **setas do teclado** para mover a cobrinha.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const elementoPlacar = document.getElementById("placar");

        const tamanhoQuadrado = 20;
        const dadosCanvas = canvas.width / tamanhoQuadrado;

        let cobra = [{ x: 10, y: 10 }];
        let maca = { x: 15, y: 15 };
        let dx = 1;
        let dy = 0;
        let pontuacao = 0;
        let mudouDirecao = false;

        // Loop principal do jogo
        function principal() {
            if (fimDeJogo()) {
                alert(`Fim de Jogo! Sua pontuação final foi: ${pontuacao}`);
                reiniciarJogo();
            }

            mudouDirecao = false;
            limparCanvas();
            desenharMaca();
            moverCobra();
            desenharCobra();

            setTimeout(principal, 100); // Velocidade do jogo (100ms)
        }

        // Limpa a tela a cada frame
        function limparCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Desenha a cobrinha
        function desenharCobra() {
            cobra.forEach((parte, index) => {
                ctx.fillStyle = index === 0 ? "#4CAF50" : "#8BC34A"; // Cabeça mais escura
                ctx.fillRect(parte.x * tamanhoQuadrado, parte.y * tamanhoQuadrado, tamanhoQuadrado - 2, tamanhoQuadrado - 2);
            });
        }

        // Move a cobrinha e checa se comeu a maçã
        function moverCobra() {
            const cabeca = { x: cobra[0].x + dx, y: cobra[0].y + dy };
            cobra.unshift(cabeca);

            if (cabeca.x === maca.x && cabeca.y === maca.y) {
                pontuacao += 10;
                elementoPlacar.innerText = `Pontuação: ${pontuacao}`;
                gerarMaca();
            } else {
                cobra.pop();
            }
        }

        // Gera uma nova maçã em posição aleatória
        function gerarMaca() {
            maca.x = Math.floor(Math.random() * dadosCanvas);
            maca.y = Math.floor(Math.random() * dadosCanvas);

            // Garante que a maçã não nasça dentro da cobra
            cobra.forEach(parte => {
                if (parte.x === maca.x && parte.y === maca.y) {
                    gerarMaca();
                }
            });
        }

        // Desenha a maçã
        function desenharMaca() {
            ctx.fillStyle = "#FF5722";
            ctx.fillRect(maca.x * tamanhoQuadrado, maca.y * tamanhoQuadrado, tamanhoQuadrado - 2, tamanhoQuadrado - 2);
        }

        // Verifica colisões (paredes ou o próprio corpo)
        function fimDeJogo() {
            const cabeca = cobra[0];

            // Colisão com as paredes
            const colidiuParede = cabeca.x < 0 || cabeca.x >= dadosCanvas || cabeca.y < 0 || cabeca.y >= dadosCanvas;

            // Colisão com o próprio corpo
            let colidiuCorpo = false;
            for (let i = 1; i < cobra.length; i++) {
                if (cobra[i].x === cabeca.x && cobra[i].y === cabeca.y) {
                    colidiuCorpo = true;
                }
            }

            return colidiuParede || colidiuCorpo;
        }

        // Reseta as variáveis para começar de novo
        function reiniciarJogo() {
            cobra = [{ x: 10, y: 10 }];
            maca = { x: 15, y: 15 };
            dx = 1;
            dy = 0;
            pontuacao = 0;
            elementoPlacar.innerText = `Pontuação: ${pontuacao}`;
        }

        // Escuta as teclas pressionadas
        document.addEventListener("keydown", mudarDirecao);

        function mudarDirecao(evento) {
            if (mudouDirecao) return;

            const TECLA_ESQUERDA = 37;
            const TECLA_CIMA = 38;
            const TECLA_DIREITA = 39;
            const TECLA_BAIXO = 40;

            const teclaPressionada = evento.keyCode;

            const indoParaCima = dy === -1;
            const indoParaBaixo = dy === 1;
            const indoParaDireita = dx === 1;
            const indoParaEsquerda = dx === -1;

            if (teclaPressionada === TECLA_ESQUERDA && !indoParaDireita) {
                dx = -1;
                dy = 0;
                mudouDirecao = true;
            }
            if (teclaPressionada === TECLA_CIMA && !indoParaBaixo) {
                dx = 0;
                dy = -1;
                mudouDirecao = true;
            }
            if (teclaPressionada === TECLA_DIREITA && !indoParaEsquerda) {
                dx = 1;
                dy = 0;
                mudouDirecao = true;
            }
            if (teclaPressionada === TECLA_BAIXO && !indoParaCima) {
                dx = 0;
                dy = 1;
                mudouDirecao = true;
            }
        }

        // Inicia o jogo
        principal();
    </script>
</body>
</html>
