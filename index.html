<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de IPTV</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121214; color: #fff; padding: 20px; text-align: center; }
        .box { max-width: 600px; margin: 50px auto; background: #202024; padding: 30px; border-radius: 8px; border: 1px solid #323238; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #121214; background: #121214; color: #fff; }
        button { padding: 12px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; margin: 5px; }
        .btn-main { background: #00875f; }
        .btn-alt { background: #5636d3; }
        .status { margin: 20px 0; padding: 15px; border-radius: 4px; display: none; font-weight: bold; }
        .loading { background: #e1a412; color: #000; }
        .success { background: #00875f; }
        .error { background: #f75a68; }
        .res { font-size: 24px; margin: 10px 0; color: #00b37e; }
    </style>
</head>
<body>

<div class="box">
    <h2>Testador Definitivo M3U</h2>
    <p>Cole a sua URL abaixo:</p>
    <input type="text" id="url" placeholder="http://..." />
    <br>
    <button class="btn-main" onclick="testar(1)">Testar Rota 1</button>
    <button class="btn-alt" onclick="testar(2)">Testar Rota 2 (Alternativa)</button>

    <div id="status" class="status"></div>

    <div style="margin-top:20px; display:flex; justify-content: space-around;">
        <div>TV: <div id="tv" class="res">0</div></div>
        <div>Filmes: <div id="mov" class="res">0</div></div>
        <div>Séries: <div id="ser" class="res">0</div></div>
    </div>
</div>

<script>
async function testar(rota) {
    const url = document.getElementById('url').value.trim();
    const status = document.getElementById('status');
    if(!url) return alert('Cole a URL');

    status.style.display = 'block';
    status.className = 'status loading';
    status.innerText = 'Processando... Aguarde.';

    // Rota 1 usa o proxy que tenta ler o texto, Rota 2 usa um proxy alternativo focado em burlar firewalls
    const proxy = rota === 1 ? 'https://corsproxy.io/?url=' : 'https://api.allorigins.win/raw?url=';
    
    try {
        const res = await fetch(proxy + encodeURIComponent(url));
        if(!res.ok) throw new Error();
        const txt = await res.text();
        
        if(!txt.includes('#EXTM3U')) {
            status.className = 'status error';
            status.innerText = 'O servidor respondeu, mas bloqueou os dados (Proteção Anti-Bot).';
            return;
        }

        let tv = (txt.match(/#EXTINF:/g) || []).length;
        // Estimativa rápida por quebra de blocos para não travar o navegador
        let movies = (txt.toUpperCase().match(/\/MOVIES\/|\/MOVIE\/|FILMES/g) || []).length;
        let series = (txt.toUpperCase().match(/\/SERIES\/|SÉRIES/g) || []).length;
        
        document.getElementById('tv').innerText = tv - movies - series;
        document.getElementById('mov').innerText = movies;
        document.getElementById('ser').innerText = series;

        status.className = 'status success';
        status.innerText = 'Conexão estabelecida! Servidor ONLINE.';
    } catch {
        status.className = 'status error';
        status.innerText = 'Sem resposta. O Firewall do servidor bloqueou o navegador.';
    }
}
</script>
</body>
</html>
