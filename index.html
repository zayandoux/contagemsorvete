<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Hub | Mario World Edition</title>

<!-- Fonte Pixelada do Google Fonts para dar o clima retro definitivo -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* Paleta de Cores Clássica do Super Mario World */
:root {
    --bg-sky: #5c94fc; /* Azul clássico do céu do Mario */
    --border-pixel: #000000;
    --box-yellow: #fcd8a0;
    --box-yellow-dark: #f8b800;
    --text-dark: #000000;
    --text-light: #ffffff;
    --btn-green: #00a800;
    --btn-green-hover: #008800;
    --accent-red: #f83800;
}

[data-theme="light"] {
    /* Mantendo o tema divertido, mudamos o fundo para a grama/fase terrestre */
    --bg-sky: #70c040; 
}

* {
    box-sizing: border-box;
    font-family: 'Press Start 2P', cursive; /* Aplica a fonte pixelada */
    margin: 0;
    padding: 0;
}

body {
    background-color: var(--bg-sky);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    font-size: 12px;
    image-rendering: pixelated; /* Evita que bordas e sombras fiquem borradas */
}

/* Container principal estilo Caixa de Diálogo/Menu de Fase */
.mario-container {
    width: 100%;
    max-width: 900px;
    background-color: #ffffff;
    border: 6px solid var(--border-pixel);
    border-radius: 0px; /* Jogos antigos não tinham cantos arredondados fluidos! */
    box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.3);
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* Cabeçalho superior com placar (HUD) */
.mario-hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 6px dashed var(--border-pixel);
    padding-bottom: 20px;
}

.hud-title h1 {
    font-size: 16px;
    color: var(--accent-red);
    text-shadow: 2px 2px 0px #000;
    margin-bottom: 8px;
}

.hud-title p {
    font-size: 9px;
    color: #555;
}

/* Interruptor de Tema Estilo Botão ON/OFF antigo */
.theme-switch-btn {
    background-color: var(--box-yellow);
    border: 4px solid var(--border-pixel);
    padding: 8px 12px;
    cursor: pointer;
    font-size: 8px;
    font-weight: bold;
    box-shadow: 4px 4px 0px #000;
}
.theme-switch-btn:active {
    box-shadow: 0px 0px 0px #000;
    transform: translate(4px, 4px);
}

/* Bloco de Inputs (Parece o bloco de itens de texto do inventário) */
.control-pad {
    background-color: #f8f8f8;
    border: 4px solid var(--border-pixel);
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: flex-end;
}

.pad-field {
    flex: 1;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.pad-field label {
    font-size: 10px;
    color: var(--text-dark);
}

.pad-field input {
    border: 4px solid var(--border-pixel);
    background-color: #ffffff;
    padding: 12px;
    font-size: 11px;
    color: #000;
    outline: none;
}
.pad-field input:focus {
    background-color: #fffde0;
}

/* Botão de Start Gigante */
.btn-start {
    background-color: var(--btn-green);
    color: var(--text-light);
    border: 4px solid var(--border-pixel);
    padding: 15px 25px;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 4px 4px 0px #000;
}
.btn-start:hover { background-color: var(--btn-green-hover); }
.btn-start:active {
    box-shadow: 0px 0px 0px #000;
    transform: translate(4px, 4px);
}

/* Lista de Fases/Servidores */
.world-map h2 {
    font-size: 14px;
    margin-bottom: 20px;
    color: #0058f8;
}

.stages-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* Cada Servidor vira um bloco de Fase */
.stage-card {
    background-color: var(--box-yellow);
    border: 4px solid var(--border-pixel);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
    box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
}

.stage-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
}

/* O ponto verde de fase */
.stage-point {
    width: 14px;
    height: 14px;
    background-color: #f83800;
    border: 2px solid #000;
    animation: blink 0.6s infinite alternate;
    flex-shrink: 0;
}

@keyframes blink {
    from { background-color: #f83800; }
    to { background-color: #f8b800; }
}

.stage-name {
    font-size: 10px;
    white-space: nowrap;
}

.stage-url-box {
    font-size: 8px;
    color: #444;
    background-color: rgba(255,255,255,0.6);
    border: 2px solid var(--border-pixel);
    padding: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 250px;
    margin-left: 10px;
}

/* Botões do Bloco */
.stage-actions {
    display: flex;
    gap: 10px;
}

.stage-actions button {
    background-color: #ffffff;
    border: 3px solid var(--border-pixel);
    padding: 8px 12px;
    font-size: 8px;
    cursor: pointer;
    box-shadow: 3px 3px 0px #000;
}
.stage-actions button:active {
    box-shadow: 0px 0px 0px #000;
    transform: translate(3px, 3px);
}

.btn-mario-m3u {
    background-color: #f8b800 !important;
}

.stage-actions button.copied {
    background-color: #00a800 !important;
    color: white;
}

.empty-text {
    text-align: center;
    padding: 40px 0;
    color: #555;
    font-size: 9px;
    line-height: 1.8;
}

/* Responsivo para Telas Menores */
@media(max-width: 780px) {
    .control-pad { flex-direction: column; align-items: stretch; }
    .stage-card { flex-direction: column; align-items: stretch; text-align: center; }
    .stage-info { flex-direction: column; }
    .stage-url-box { max-width: 100%; margin-left: 0; margin-top: 5px; }
    .stage-actions { justify-content: center; }
}
</style>
</head>
<body>

<div class="mario-container">
    
    <!-- Painel de Placar (HUD) -->
    <div class="mario-hud">
        <div class="hud-title">
            <h1>MARIO WORLD M3U</h1>
            <p>PLAYER 1 - TOTAL CONTROL</p>
        </div>
        <button class="theme-switch-btn" onclick="toggleTheme()">MUDAR MUNDO</button>
    </div>

    <!-- Bloco de Comando / Controles -->
    <div class="control-pad">
        <div class="pad-field">
            <label>USUÁRIO (LOGIN)</label>
            <input id="user" placeholder="NAME" autocomplete="off">
        </div>
        <div class="pad-field">
            <label>SENHA (PASSWORD)</label>
            <input id="pass" type="text" placeholder="KEY" autocomplete="off">
        </div>
        <button class="btn-start" onclick="gerar()">START</button>
    </div>

    <!-- Mapa das Fases -->
    <div class="world-map">
        <h2>SELECT STAGE:</h2>
        <div id="resultado">
            <div class="empty-text">INSIRA SUAS CREDENCIAIS<br>E APERTE START PARA ABRIR O MAPA!</div>
        </div>
    </div>

</div>

<script>
// Lista de servidores transformados em mundos/fases clássicas
const servidores = [
    {nome:"1-1 SEVEN ISLAND", url:"http://seven.blcplay.com"},
    {nome:"1-2 EXPLOSION BOMBS", url:"http://nsync.space"},
    {nome:"1-3 SPEED ZONE", url:"http://netuno.live"},
    {nome:"2-1 GALAXY CASTLE", url:"http://galaxy.blcplay.com"},
    {nome:"2-2 LUNAR VALLEY", url:"http://lunar.kkrototv.fun"},
    {nome:"2-3 ATENA TEMPLE", url:"http://atena.kkrototv.fun"},
    {nome:"3-1 SOLAR MOUNTAIN", url:"http://solar.kkrototv.fun"},
    {nome:"3-2 VENUS WIND", url:"http://venus.blcplay.com"},
    {nome:"3-3 FIRE BRIDGE", url:"http://fire.kkrototv.fun"}
];

function toggleTheme() {
    const body = document.documentElement;
    if (body.getAttribute("data-theme") === "light") {
        body.removeAttribute("data-theme");
    } else {
        body.setAttribute("data-theme", "light");
    }
}

function gerar(){
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();

    if(!user || !pass){
        alert("ERRO! INSIRA SEU USUARIO E SENHA.");
        return;
    }

    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    let listContainer = document.createElement("div");
    listContainer.className = "stages-container";

    servidores.forEach((s, i)=>{
        let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

        let row = document.createElement("div");
        row.className = "stage-card";
        row.innerHTML = `
            <div class="stage-info">
                <div class="stage-point"></div>
                <div class="stage-name">${s.nome}</div>
                <div class="stage-url-box">${link}</div>
            </div>
            <div class="stage-actions">
                <button id="m3u${i}" class="btn-mario-m3u">M3U</button>
                <button id="dns${i}">DNS</button>
                <button onclick="testar('${s.url}')">GO ↗</button>
            </div>
        `;
        listContainer.appendChild(row);
        resultado.appendChild(listContainer);

        // Ações Mecânicas Retrô de Cópia
        document.getElementById(`m3u${i}`).onclick = function(){
            navigator.clipboard.writeText(link);
            this.innerText = "OK!";
            this.classList.add("copied");
            setTimeout(() => { this.innerText = "M3U"; this.classList.remove("copied"); }, 1200);
        };

        document.getElementById(`dns${i}`).onclick = function(){
            navigator.clipboard.writeText(s.url);
            this.innerText = "OK!";
            this.classList.add("copied");
            setTimeout(() => { this.innerText = "DNS"; this.classList.remove("copied"); }, 1200);
        };
    });
}

function testar(url){ window.open(url, "_blank"); }
</script>

</body>
</html>
